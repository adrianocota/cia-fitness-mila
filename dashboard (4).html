<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mila — Painel de Atendimento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E8E6E0;
    --border-strong: #D4D0C8;
    --text: #1A1A18;
    --text-2: #6B6960;
    --text-3: #A8A49C;
    --gold: #C8960A;
    --gold-bg: #FDF6E3;
    --gold-border: #F0D878;
    --green: #1A7A4A;
    --green-bg: #EDF7F2;
    --green-border: #B8DFC8;
    --blue: #1A5FA0;
    --blue-bg: #EEF4FB;
    --blue-border: #B8D0EC;
    --amber: #B05A10;
    --amber-bg: #FDF1E6;
    --amber-border: #F0C898;
    --red: #C02020;
    --red-bg: #FEF0F0;
    --red-border: #F0C0C0;
    --gray-bg: #F0EEE8;
    --gray-border: #D8D4CC;
    --gray-text: #706C64;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }

  /* ── TOPO ── */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .brand { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
  .brand span { color: var(--text-3); font-weight: 300; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2DB870; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .topbar-right { display: flex; align-items: center; gap: 20px; }
  .periodo-btn { font-size: 12px; color: var(--text-2); background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
  .periodo-btn.ativo, .periodo-btn:hover { border-color: var(--text); color: var(--text); }
  .hora { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-3); }

  /* ── ABAS ── */
  .abas { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 0; }
  .aba { font-size: 13px; padding: 12px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-2); transition: all .15s; font-family: inherit; background: none; border-top: none; border-left: none; border-right: none; }
  .aba.ativa { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .aba:hover { color: var(--text); }

  /* ── LAYOUT ── */
  .container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
  .painel { display: none; }
  .painel.ativo { display: block; }

  /* ── FUNIL ── */
  .funil { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
  .etapa { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; transition: border-color .15s; text-align: center; }
  .etapa:hover { border-color: var(--border-strong); }
  .etapa-num { font-size: 28px; font-weight: 300; letter-spacing: -1px; margin-bottom: 4px; }
  .etapa-label { font-size: 11px; color: var(--text-2); line-height: 1.4; }
  .n-mila { color: var(--green); }
  .n-humano { color: var(--blue); }
  .n-agendado { color: var(--amber); }
  .n-matriculado { color: var(--gold); }
  .n-perdido { color: var(--text-3); }

  /* ── ALERTA ── */
  .alerta { background: var(--amber-bg); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: var(--amber); display: flex; align-items: center; gap: 8px; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .busca-wrap { position: relative; flex: 1; min-width: 200px; }
  .busca-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
  .busca { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; }
  .busca:focus { border-color: var(--border-strong); }
  .filtros { display: flex; gap: 6px; flex-wrap: wrap; }
  .filtro { font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: none; font-family: inherit; color: var(--text-2); display: flex; align-items: center; gap: 5px; transition: all .15s; }
  .filtro.ativo, .filtro:hover { border-color: var(--text); color: var(--text); }
  .badge { font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }

  /* ── LISTA ── */
  .secao-label { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .6px; padding: 4px 0 8px; }
  .lead-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
  .lead-row:hover { border-color: var(--border-strong); }
  .lead-row.urgente { border-color: var(--amber-border); background: var(--amber-bg); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .av-ativo, .av-mila { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .av-transferido, .av-humano { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .av-agendado { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .av-matriculado { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); }
  .av-perdido, .av-encerrado, .av-crm { background: var(--gray-bg); color: var(--gray-text); border: 1px solid var(--gray-border); }
  .lead-middle { flex: 1; min-width: 0; }
  .lead-nome-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
  .lead-nome { font-weight: 500; font-size: 14px; }
  .lead-nome.sem-nome { color: var(--text-3); font-style: italic; font-weight: 400; }
  .pill { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; border: 1px solid transparent; }
  .pill-mila { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .pill-humano { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }
  .pill-agendado { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .pill-matriculado { background: var(--gold-bg); color: var(--gold); border-color: var(--gold-border); }
  .pill-perdido { background: var(--gray-bg); color: var(--gray-text); }
  .pill-encerrado { background: var(--gray-bg); color: var(--gray-text); }
  .pill-crm { background: var(--gray-bg); color: var(--gray-text); }
  .pill-urgente { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .lead-sub { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-3); }
  .lead-nome-edit { cursor: pointer; color: var(--text-3); text-decoration: underline; text-decoration-style: dotted; }
  .lead-nome-edit:hover { color: var(--text-2); }
  .lead-agendado-info { font-size: 12px; color: var(--amber); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .lead-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .lead-tempo { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); }
  .btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .btn { font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; background: var(--surface); color: var(--text-2); transition: all .15s; white-space: nowrap; }
  .btn:hover { border-color: var(--border-strong); color: var(--text); }
  .btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .btn-green:hover { background: var(--green); color: #fff; }
  .btn-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }
  .btn-blue:hover { background: var(--blue); color: #fff; }
  .btn-amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .btn-amber:hover { background: var(--amber); color: #fff; }
  .btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .btn-red:hover { background: var(--red); color: #fff; }
  .empty { text-align: center; color: var(--text-3); padding: 40px 0; font-size: 13px; }
  .footer { text-align: center; color: var(--text-3); font-size: 11px; padding: 20px 0 8px; }

  /* ── MODAIS ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.aberto { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 360px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .modal input[type=text], .modal input[type=datetime-local], .modal textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal input:focus, .modal textarea:focus { border-color: var(--border-strong); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal-agendamento-wrap label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 6px; }

  /* ── ABA CRM ── */
  .crm-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .crm-titulo { font-size: 15px; font-weight: 500; }
  .crm-subtitulo { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .crm-filtros { display: flex; gap: 6px; flex-wrap: wrap; }
  .crm-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .crm-row.erro { border-color: var(--red-border); background: var(--red-bg); }
  .crm-gatilho-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--gray-bg); color: var(--gray-text); white-space: nowrap; font-weight: 500; }
  .crm-middle { flex: 1; min-width: 0; }
  .crm-nome { font-weight: 500; font-size: 13px; }
  .crm-tel { font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace; }
  .crm-right { text-align: right; flex-shrink: 0; }
  .crm-hora { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); }
  .crm-status { font-size: 11px; margin-top: 2px; }
  .crm-status.enviado { color: var(--green); }
  .crm-status.erro { color: var(--red); }
  .crm-empty { text-align: center; color: var(--text-3); padding: 40px 0; font-size: 13px; }
  .crm-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .crm-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .crm-stat-num { font-size: 26px; font-weight: 300; letter-spacing: -1px; }
  .crm-stat-label { font-size: 11px; color: var(--text-2); margin-top: 2px; }

  .gatilho-label { display: inline-block; }

  /* ── HISTÓRICO ── */
  .msg-balao { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg-entrada { align-self: flex-start; background: var(--gray-bg); color: var(--text); border-bottom-left-radius: 4px; }
  .msg-saida { align-self: flex-end; background: #DCF8C6; color: #1a1a1a; border-bottom-right-radius: 4px; }
  .msg-sistema { align-self: center; background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); font-size: 11px; padding: 4px 10px; border-radius: 20px; }
  .msg-hora { font-size: 10px; color: var(--text-3); margin-top: 2px; text-align: right; }
  .msg-wrap { display: flex; flex-direction: column; }
  .msg-wrap.entrada { align-items: flex-start; }
  .msg-wrap.saida { align-items: flex-end; }
  .msg-wrap.sistema { align-items: center; }
  #modal-historico-body:empty::after { content: "Nenhuma mensagem encontrada"; color: var(--text-3); text-align: center; padding: 20px; }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="live-dot"></div>
    <div class="brand">Mila <span>· Cia do Fitness</span></div>
  </div>
  <div class="topbar-right">
    <button class="periodo-btn ativo" data-p="hoje" onclick="setPeriodo(this)">Hoje</button>
    <button class="periodo-btn" data-p="semana" onclick="setPeriodo(this)">Semana</button>
    <button class="periodo-btn" data-p="mes" onclick="setPeriodo(this)">Mês</button>
    <button class="periodo-btn" data-p="total" onclick="setPeriodo(this)">Total</button>
    <div class="hora" id="hora"></div>
  </div>
</div>

<!-- Abas -->
<div class="abas">
  <button class="aba ativa" onclick="setAba('leads', this)">Leads</button>
  <button class="aba" onclick="setAba('crm', this)">CRM</button>
</div>

<div class="container">

  <!-- ── PAINEL LEADS ── -->
  <div class="painel ativo" id="painel-leads">

    <!-- Funil -->
    <div class="funil">
      <div class="etapa etapa-mila" onclick="filtrarStatus('mila')">
        <div class="etapa-num n-mila" id="cnt-mila">0</div>
        <div class="etapa-label">Mila<br>conversando</div>
      </div>
      <div class="etapa etapa-humano" onclick="filtrarStatus('humano')">
        <div class="etapa-num n-humano" id="cnt-humano">0</div>
        <div class="etapa-label">Com<br>humano</div>
      </div>
      <div class="etapa etapa-agendado" onclick="filtrarStatus('agendado')">
        <div class="etapa-num n-agendado" id="cnt-agendado">0</div>
        <div class="etapa-label">Visita<br>agendada</div>
      </div>
      <div class="etapa etapa-matriculado" onclick="filtrarStatus('matriculado')">
        <div class="etapa-num n-matriculado" id="cnt-matriculado">0</div>
        <div class="etapa-label">Matri-<br>culados</div>
      </div>
      <div class="etapa etapa-perdido" onclick="filtrarStatus('perdido')">
        <div class="etapa-num n-perdido" id="cnt-perdido">0</div>
        <div class="etapa-label">Sem<br>resposta</div>
      </div>
    </div>

    <!-- Alerta -->
    <div class="alerta" id="alerta" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alerta-texto"></span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="busca-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="busca" type="text" placeholder="Buscar por nome ou número..." id="busca" oninput="renderLista()" />
      </div>
      <div class="filtros">
        <button class="filtro ativo" data-f="todos" onclick="setFiltro(this)">Todos <span class="badge" id="b-todos" style="background:var(--gray-bg);color:var(--gray-text)"></span></button>
        <button class="filtro" data-f="mila" onclick="setFiltro(this)">Mila <span class="badge" style="background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)" id="b-mila"></span></button>
        <button class="filtro" data-f="humano" onclick="setFiltro(this)">Com humano <span class="badge" style="background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)" id="b-humano"></span></button>
        <button class="filtro" data-f="agendado" onclick="setFiltro(this)">Agendados <span class="badge" style="background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)" id="b-agendado"></span></button>
        <button class="filtro" data-f="perdido" onclick="setFiltro(this)">Sem resposta <span class="badge" style="background:var(--gray-bg);color:var(--gray-text)" id="b-perdido"></span></button>
      </div>
    </div>

    <!-- Lista -->
    <div class="lista" id="lista"></div>
    <div class="footer">atualizado automaticamente · Supabase</div>
  </div>

  <!-- ── PAINEL CRM ── -->
  <div class="painel" id="painel-crm">
    <div class="crm-header">
      <div>
        <div class="crm-titulo">Disparos CRM</div>
        <div class="crm-subtitulo" id="crm-subtitulo">carregando...</div>
      </div>
      <div class="crm-filtros">
        <button class="filtro ativo" data-cf="todos" onclick="setCrmFiltro(this)">Todos</button>
        <button class="filtro" data-cf="enviado" onclick="setCrmFiltro(this)">Enviados</button>
        <button class="filtro" data-cf="erro" onclick="setCrmFiltro(this)">Erros</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="crm-stats">
      <div class="crm-stat">
        <div class="crm-stat-num" id="crm-cnt-total">0</div>
        <div class="crm-stat-label">Total hoje</div>
      </div>
      <div class="crm-stat">
        <div class="crm-stat-num" style="color:var(--green)" id="crm-cnt-enviados">0</div>
        <div class="crm-stat-label">Enviados</div>
      </div>
      <div class="crm-stat">
        <div class="crm-stat-num" style="color:var(--red)" id="crm-cnt-erros">0</div>
        <div class="crm-stat-label">Erros</div>
      </div>
    </div>

    <div id="crm-lista"></div>
    <div class="footer">atualizado a cada 60s · Supabase</div>
  </div>

</div>

<!-- Modal nome -->
<div class="modal-overlay" id="modal-nome">
  <div class="modal">
    <h3>Editar nome</h3>
    <input type="text" id="modal-input" placeholder="Nome do lead..." />
    <div class="modal-btns">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-green" onclick="salvarNome()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal agendamento -->
<div class="modal-overlay" id="modal-agendamento">
  <div class="modal">
    <h3>Agendar visita</h3>
    <div class="modal-agendamento-wrap">
      <div>
        <label>Data e hora da visita</label>
        <input type="datetime-local" id="modal-agendamento-input" />
      </div>
    </div>
    <div class="modal-btns" style="margin-top:12px">
      <button class="btn" onclick="fecharModalAgendamento()">Cancelar</button>
      <button class="btn btn-amber" onclick="salvarAgendamento()">Confirmar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hyvmfmynyjpocdtjayml.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5dm1mbXlueWpwb2NkdGpheW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4OTcyODQsImV4cCI6MjA5NDQ3MzI4NH0.Gkohw2QI55v2ht_wJ_HrD9WRN9iWwR_6o-hD0rU3Gjc';

let leads = [];
const normalizar = s => s === 'ativo' ? 'mila' : (s === 'transferido' ? 'humano' : s);
let filtroAtivo = 'todos';
let periodoAtivo = 'hoje';
let modalLeadId = null;
let abaAtiva = 'leads';

// ── CRM ──
let crmDisparos = [];
let crmFiltroAtivo = 'todos';

// ── ABAS ──
function setAba(aba, el) {
  abaAtiva = aba;
  document.querySelectorAll('.aba').forEach(b => b.classList.remove('ativa'));
  el.classList.add('ativa');
  document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));
  document.getElementById(`painel-${aba}`).classList.add('ativo');
  if (aba === 'crm') carregarCRM();
}

// ── LEADS ──
async function carregarLeads() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=id,nome,telefone,status,ultima_interacao_em,agendado_para&order=ultima_interacao_em.desc&limit=200`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    leads = await res.json();
  } catch(e) {
    console.warn('Supabase indisponível:', e.message);
  }
  renderTudo();
}

async function atualizarStatus(id, novoStatus) {
  leads = leads.map(l => l.id === id ? {...l, status: novoStatus} : l);
  renderTudo();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: novoStatus })
    });
  } catch(e) { console.warn('Erro ao salvar status:', e.message); }
}

async function atualizarNome(id, nome) {
  leads = leads.map(l => l.id === id ? {...l, nome} : l);
  renderTudo();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ nome })
    });
  } catch(e) { console.warn('Erro ao salvar nome:', e.message); }
}

function abrirWhatsApp(tel) {
  const num = tel.replace(/\D/g,'');
  const full = num.startsWith('55') ? num : `55${num}`;
  window.open(`https://wa.me/${full}`, '_blank');
}

function tempoRelativo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)}min`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return `${Math.floor(diff/86400)}d`;
}

function iniciais(nome, tel) {
  if (nome) return nome.trim().split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();
  return tel ? tel.slice(-2) : '??';
}

function eUrgente(lead) {
  if (normalizar(lead.status) !== 'humano') return false;
  const horas = (Date.now() - new Date(lead.ultima_interacao_em).getTime()) / 3600000;
  return horas > 4;
}

function filtrarLeads() {
  const q = document.getElementById('busca').value.toLowerCase();
  return leads.filter(l => {
    const matchFiltro = filtroAtivo === 'todos' || normalizar(l.status) === filtroAtivo;
    const matchBusca = !q || (l.nome||'').toLowerCase().includes(q) || l.telefone.includes(q);
    return matchFiltro && matchBusca;
  });
}

function renderBotoes(lead) {
  const s = normalizar(lead.status);
  const tel = lead.telefone;
  const btnHistorico = `<button class="btn" onclick="event.stopPropagation();abrirHistorico(${lead.id})">Histórico</button>`;
  const btnWpp = `<button class="btn" onclick="event.stopPropagation();abrirWhatsApp('${tel}')">WhatsApp</button>`;
  if (s === 'mila') return `
    ${btnHistorico}
    <button class="btn btn-blue" onclick="event.stopPropagation();assumir(${lead.id})">Assumir</button>
    <button class="btn btn-red" onclick="event.stopPropagation();atualizarStatus(${lead.id},'encerrado')">Encerrar</button>`;
  if (s === 'humano') return `
    ${btnHistorico}
    ${btnWpp}
    <button class="btn btn-amber" onclick="event.stopPropagation();abrirModalAgendamento(${lead.id})">Agendar visita</button>
    <button class="btn btn-green" onclick="event.stopPropagation();atualizarStatus(${lead.id},'matriculado')">Matriculado</button>
    <button class="btn btn-red" onclick="event.stopPropagation();atualizarStatus(${lead.id},'encerrado')">Encerrar</button>`;
  if (s === 'agendado') return `
    ${btnHistorico}
    ${btnWpp}
    <button class="btn btn-green" onclick="event.stopPropagation();atualizarStatus(${lead.id},'matriculado')">Compareceu</button>
    <button class="btn" onclick="event.stopPropagation();naoCompareceu(${lead.id})">Não veio</button>`;
  if (s === 'perdido') return `
    ${btnHistorico}
    <button class="btn btn-blue" onclick="event.stopPropagation();atualizarStatus(${lead.id},'mila')">Reativar Mila</button>
    <button class="btn btn-red" onclick="event.stopPropagation();atualizarStatus(${lead.id},'encerrado')">Encerrar</button>`;
  if (s === 'matriculado') return `
    ${btnHistorico}
    ${btnWpp}`;
  return btnHistorico;
}

function renderLead(lead) {
  const urgente = eUrgente(lead);
  const av = `av-${lead.status}`;
  const temNome = !!lead.nome;
  const tel = lead.telefone.replace(/(\d{2})(\d{2})(\d{4,5})(\d{4})/, '+$1 $2 $3-$4');
  const s = normalizar(lead.status);
  const infoAgendado = (s === 'agendado' && lead.agendado_para)
    ? '<div class="lead-agendado-info"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Visita: ' + formatarDataVisita(lead.agendado_para) + '</div>'
    : '';
  return `
  <div class="lead-row${urgente?' urgente':''}" onclick="abrirHistorico(${lead.id})">
    <div class="avatar ${av}">${iniciais(lead.nome, lead.telefone)}</div>
    <div class="lead-middle">
      <div class="lead-nome-row">
        <span class="lead-nome${temNome?'':' sem-nome'}">${temNome ? lead.nome : 'sem nome'}</span>
        <span class="pill pill-${normalizar(lead.status)}">${statusLabel(normalizar(lead.status))}</span>
        ${urgente ? '<span class="pill pill-urgente">urgente</span>' : ''}
      </div>
      <div class="lead-sub">
        <span class="lead-tel">${tel}</span>
        <span class="lead-nome-edit" onclick="event.stopPropagation();abrirModal(${lead.id},'${(lead.nome||'').replace(/'/g,"\\'")}')">editar nome</span>
      </div>
      ${infoAgendado}
    </div>
    <div class="lead-right">
      <span class="lead-tempo">${tempoRelativo(lead.ultima_interacao_em)}</span>
      <div class="btns">${renderBotoes(lead)}</div>
    </div>
  </div>`;
}

function statusLabel(s) {
  const m = {mila:'Mila conversando',humano:'Com humano',agendado:'Visita agendada',matriculado:'Matriculado',perdido:'Sem resposta',encerrado:'Encerrado'};
  return m[s]||s;
}

function renderLista() {
  const lista = filtrarLeads();
  const el = document.getElementById('lista');
  if (!lista.length) { el.innerHTML = '<div class="empty">Nenhum lead encontrado</div>'; return; }
  const urgentes = lista.filter(eUrgente);
  const normais = lista.filter(l => !eUrgente(l));
  let html = '';
  if (urgentes.length) {
    html += `<div class="secao-label">Atenção necessária</div>`;
    html += urgentes.map(renderLead).join('');
    if (normais.length) html += `<div class="secao-label" style="margin-top:8px">Outros</div>`;
  }
  html += normais.map(renderLead).join('');
  el.innerHTML = html;
}

function renderContadores() {
  const cnt = s => leads.filter(l=>normalizar(l.status)===s).length;
  document.getElementById('cnt-mila').textContent = cnt('mila');
  document.getElementById('cnt-humano').textContent = cnt('humano');
  document.getElementById('cnt-agendado').textContent = cnt('agendado');
  document.getElementById('cnt-matriculado').textContent = cnt('matriculado');
  document.getElementById('cnt-perdido').textContent = cnt('perdido');
  document.getElementById('b-todos').textContent = leads.length;
  document.getElementById('b-mila').textContent = cnt('mila');
  document.getElementById('b-humano').textContent = cnt('humano');
  document.getElementById('b-agendado').textContent = cnt('agendado');
  document.getElementById('b-perdido').textContent = cnt('perdido');
  const urgentes = leads.filter(eUrgente).length;
  const alertaEl = document.getElementById('alerta');
  if (urgentes > 0) {
    alertaEl.style.display = 'flex';
    document.getElementById('alerta-texto').textContent = `${urgentes} lead${urgentes>1?'s':''} com humano há mais de 4h sem atualização de status`;
  } else {
    alertaEl.style.display = 'none';
  }
}

function renderTudo() { renderContadores(); renderLista(); }

function setFiltro(el) {
  document.querySelectorAll('.filtro[data-f]').forEach(b=>b.classList.remove('ativo'));
  el.classList.add('ativo');
  filtroAtivo = el.dataset.f;
  renderLista();
}

function filtrarStatus(s) {
  filtroAtivo = s;
  document.querySelectorAll('.filtro[data-f]').forEach(b => b.classList.toggle('ativo', b.dataset.f === s));
  renderLista();
}

function setPeriodo(el) {
  document.querySelectorAll('.periodo-btn').forEach(b=>b.classList.remove('ativo'));
  el.classList.add('ativo');
  periodoAtivo = el.dataset.p;
  carregarLeads();
  if (abaAtiva === 'crm') carregarCRM();
}

function assumir(id) {
  const lead = leads.find(l=>l.id===id);
  atualizarStatus(id, 'humano');
  if (lead) abrirWhatsApp(lead.telefone);
}

function naoCompareceu(id) { atualizarStatus(id, 'mila'); }

let modalAgendamentoLeadId = null;

function abrirModalAgendamento(id) {
  modalAgendamentoLeadId = id;
  const amanha = new Date();
  amanha.setDate(amanha.getDate() + 1);
  amanha.setHours(10, 0, 0, 0);
  document.getElementById('modal-agendamento-input').value = amanha.toISOString().slice(0, 16);
  document.getElementById('modal-agendamento').classList.add('aberto');
  setTimeout(() => document.getElementById('modal-agendamento-input').focus(), 50);
}

function fecharModalAgendamento() {
  document.getElementById('modal-agendamento').classList.remove('aberto');
  modalAgendamentoLeadId = null;
}

async function salvarAgendamento() {
  const val = document.getElementById('modal-agendamento-input').value;
  if (!val || !modalAgendamentoLeadId) { fecharModalAgendamento(); return; }
  const iso = new Date(val).toISOString();
  const id = modalAgendamentoLeadId;
  leads = leads.map(l => l.id === id ? {...l, status: 'agendado', agendado_para: iso} : l);
  renderTudo();
  fecharModalAgendamento();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'agendado', agendado_para: iso })
    });
  } catch(e) { console.warn('Erro ao salvar agendamento:', e.message); }
}

document.getElementById('modal-agendamento').addEventListener('click', function(e) { if (e.target === this) fecharModalAgendamento(); });
document.getElementById('modal-agendamento-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') salvarAgendamento(); if (e.key === 'Escape') fecharModalAgendamento(); });

function formatarDataVisita(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const hoje = new Date();
  const amanha = new Date(hoje); amanha.setDate(hoje.getDate() + 1);
  const hora = d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  if (d.toDateString() === hoje.toDateString()) return `hoje às ${hora}`;
  if (d.toDateString() === amanha.toDateString()) return `amanhã às ${hora}`;
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ` às ${hora}`;
}

function abrirModal(id, nomeAtual) {
  modalLeadId = id;
  document.getElementById('modal-input').value = nomeAtual;
  document.getElementById('modal-nome').classList.add('aberto');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function fecharModal() { document.getElementById('modal-nome').classList.remove('aberto'); modalLeadId = null; }

function salvarNome() {
  const nome = document.getElementById('modal-input').value.trim();
  if (nome && modalLeadId) atualizarNome(modalLeadId, nome);
  fecharModal();
}

document.getElementById('modal-nome').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });
document.getElementById('modal-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') salvarNome(); if (e.key === 'Escape') fecharModal(); });

// ── CRM ──

const GATILHO_LABELS = {
  '9_dias_sem_presenca': '9 dias sem presença',
  '18_dias_sem_presenca': '18 dias sem presença',
  'aniversario': 'Aniversário',
  '1_dia_apos_matricula': 'Boas-vindas',
  '30_dias_apos_matricula': '1 mês de academia',
  '16_dias_antes_vencimento': 'Aviso vencimento',
  '5_dias_apos_vencimento': 'Plano vencido',
  '30_dias_apos_vencimento': 'Ex-aluno reconexão',
  'cobranca_recusada': 'Cobrança recusada',
  'cobranca_recusada_3d': 'Cobrança recusada 3d',
  'cobranca_recusada_7d': 'Cobrança recusada 7d',
  'pos_visita': 'Pós-visita',
  '7_dias_apos_oportunidade': '7 dias prospect',
};

function gatilhoLabel(g) { return GATILHO_LABELS[g] || g; }

function periodoFiltroSQL() {
  const agora = new Date();
  if (periodoAtivo === 'hoje') {
    const inicio = new Date(agora); inicio.setHours(0,0,0,0);
    return `&created_at=gte.${inicio.toISOString()}`;
  }
  if (periodoAtivo === 'semana') {
    const inicio = new Date(agora); inicio.setDate(agora.getDate() - 7);
    return `&created_at=gte.${inicio.toISOString()}`;
  }
  if (periodoAtivo === 'mes') {
    const inicio = new Date(agora); inicio.setDate(agora.getDate() - 30);
    return `&created_at=gte.${inicio.toISOString()}`;
  }
  return '';
}

async function carregarCRM() {
  try {
    const filtroData = periodoFiltroSQL();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/crm_disparos?select=id,data,telefone,gatilho,nome,status,created_at&order=created_at.desc&limit=200${filtroData}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    crmDisparos = await res.json();
  } catch(e) {
    console.warn('Erro ao carregar CRM:', e.message);
    crmDisparos = [];
  }
  renderCRM();
}

function setCrmFiltro(el) {
  document.querySelectorAll('.filtro[data-cf]').forEach(b => b.classList.remove('ativo'));
  el.classList.add('ativo');
  crmFiltroAtivo = el.dataset.cf;
  renderCRM();
}

function renderCRM() {
  const periodoLabel = {hoje:'hoje',semana:'últimos 7 dias',mes:'últimos 30 dias',total:'todo o período'}[periodoAtivo] || periodoAtivo;
  const total = crmDisparos.length;
  const enviados = crmDisparos.filter(d => d.status === 'enviado' || !d.status).length;
  const erros = crmDisparos.filter(d => d.status === 'erro').length;

  document.getElementById('crm-subtitulo').textContent = `${total} disparo${total !== 1 ? 's' : ''} · ${periodoLabel}`;
  document.getElementById('crm-cnt-total').textContent = total;
  document.getElementById('crm-cnt-enviados').textContent = enviados;
  document.getElementById('crm-cnt-erros').textContent = erros;

  const lista = crmDisparos.filter(d => {
    if (crmFiltroAtivo === 'todos') return true;
    if (crmFiltroAtivo === 'enviado') return d.status === 'enviado' || !d.status;
    if (crmFiltroAtivo === 'erro') return d.status === 'erro';
    return true;
  });

  const el = document.getElementById('crm-lista');
  if (!lista.length) {
    el.innerHTML = '<div class="crm-empty">Nenhum disparo encontrado</div>';
    return;
  }

  el.innerHTML = lista.map(d => {
    const tel = (d.telefone || '').replace(/(\d{2})(\d{2})(\d{4,5})(\d{4})/, '+$1 $2 $3-$4');
    const hora = d.created_at ? new Date(d.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : '';
    const data = d.created_at ? new Date(d.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}) : d.data || '';
    const statusTxt = d.status === 'erro' ? 'erro' : 'enviado';
    const isErro = d.status === 'erro';
    return `
    <div class="crm-row${isErro ? ' erro' : ''}">
      <span class="crm-gatilho-pill">${gatilhoLabel(d.gatilho)}</span>
      <div class="crm-middle">
        <div class="crm-nome">${d.nome || 'sem nome'}</div>
        <div class="crm-tel">${tel}</div>
      </div>
      <div class="crm-right">
        <div class="crm-hora">${data} ${hora}</div>
        <div class="crm-status ${statusTxt}">${statusTxt}</div>
      </div>
    </div>`;
  }).join('');
}


async function abrirHistorico(id) {
  const lead = leads.find(l => l.id === id);
  const titulo = lead ? (lead.nome || lead.telefone) : 'Histórico';
  document.getElementById('modal-historico-titulo').textContent = titulo;
  document.getElementById('modal-historico-body').innerHTML = '<div style="text-align:center;color:var(--text-3);padding:20px">Carregando...</div>';
  document.getElementById('modal-historico').classList.add('aberto');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/mensagens?lead_id=eq.${id}&order=created_at.asc&limit=500`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const msgs = await res.json();

    if (!msgs.length) {
      document.getElementById('modal-historico-body').innerHTML = '<div style="text-align:center;color:var(--text-3);padding:20px">Nenhuma mensagem encontrada</div>';
      return;
    }

    document.getElementById('modal-historico-body').innerHTML = msgs.map(m => {
      const dir = m.direcao === 'entrada' ? 'entrada' : (m.origem === 'sistema' ? 'sistema' : 'saida');
      const hora = m.created_at ? new Date(m.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit', day:'2-digit', month:'2-digit'}) : '';
      const texto = (m.conteudo || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      if (dir === 'sistema') {
        return `<div class="msg-wrap sistema"><div class="msg-balao msg-sistema">${texto}</div></div>`;
      }
      return `<div class="msg-wrap ${dir}">
        <div class="msg-balao msg-${dir}">${texto}</div>
        <div class="msg-hora">${hora}</div>
      </div>`;
    }).join('');

    // Scroll para o final
    const body = document.getElementById('modal-historico-body');
    body.scrollTop = body.scrollHeight;
  } catch(e) {
    document.getElementById('modal-historico-body').innerHTML = '<div style="text-align:center;color:var(--red);padding:20px">Erro ao carregar mensagens</div>';
    console.warn('Erro ao carregar histórico:', e.message);
  }
}

function fecharHistorico() {
  document.getElementById('modal-historico').classList.remove('aberto');
}

document.addEventListener('DOMContentLoaded', function() {
  const mh = document.getElementById('modal-historico');
  if (mh) mh.addEventListener('click', function(e) { if (e.target === this) fecharHistorico(); });
});

// ── RELÓGIO E AUTO-REFRESH ──
function atualizarHora() {
  const h = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('hora').textContent = h;
}

setInterval(atualizarHora, 1000);
atualizarHora();
setInterval(carregarLeads, 30000);
setInterval(() => { if (abaAtiva === 'crm') carregarCRM(); }, 60000);
carregarLeads();
