<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
:root{--bg:#080808;--s:#111;--s2:#181818;--bo:rgba(255,255,255,0.06);--go:#f0b429;--go2:#d4920a;--go3:#ffd166;--glow:rgba(240,180,41,0.15);--gr:#22c97a;--re:#ff4d4d;--bl:#4da6ff;--pu:#9b6dff;--tx:#f5f5f5;--mu:#555;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% -10%,rgba(240,180,41,0.07),transparent 60%)}
.lb{background:var(--s);border:1px solid rgba(240,180,41,0.12);border-radius:24px;padding:48px 40px;width:100%;max-width:360px;text-align:center;position:relative;overflow:hidden}
.lb::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--go),transparent)}
.ll{width:150px;margin:0 auto 28px}
.ll img{width:100%}
.lb h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.15em;color:var(--go);margin-bottom:4px}
.lb p{color:var(--mu);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:32px}
.lb input{width:100%;background:var(--s2);border:1px solid var(--bo);border-radius:10px;padding:13px 16px;color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.1em}
.lb input:focus{border-color:var(--go);box-shadow:0 0 0 3px rgba(240,180,41,.08)}
.pw{position:relative;margin-bottom:12px}
.pw input{margin-bottom:0;padding-right:46px}
.eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .2s}
.eye:hover{color:var(--go)}
.eye.on{color:var(--go)}
.lbtn{width:100%;background:var(--go);color:#000;border:none;border-radius:10px;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.12em;cursor:pointer;transition:all .2s}
.lbtn:hover{background:var(--go3);transform:translateY(-1px);box-shadow:0 8px 28px rgba(240,180,41,.3)}
.lerr{color:var(--re);font-size:12px;margin-top:8px}
#app{display:none}
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bo);position:sticky;top:0;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);z-index:100}
.hdl{display:flex;align-items:center;gap:14px}
.hlogo{height:34px}
.hdiv{width:1px;height:26px;background:var(--bo)}
.htit{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.14em;color:var(--go)}
.hsub{font-size:10px;color:var(--mu);letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
.rbtn{background:var(--s2);border:1px solid var(--bo);border-radius:8px;color:var(--mu);padding:7px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:'Inter',sans-serif}
.rbtn:hover{border-color:var(--go);color:var(--go)}
.nav{display:flex;padding:0 20px;border-bottom:1px solid var(--bo);overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:13px 16px;cursor:pointer;white-space:nowrap;transition:all .2s}
.nb.active{color:var(--go);border-bottom-color:var(--go)}
.nb:hover:not(.active){color:var(--tx)}
.ct{padding:20px;max-width:720px;margin:0 auto}
.tp{display:none}
.tp.active{display:block}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.cd{background:var(--s);border:1px solid var(--bo);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:border-color .2s}
.cd:hover{border-color:rgba(240,180,41,.18)}
.cgl{position:absolute;top:-40px;right:-40px;width:100px;height:100px;border-radius:50%;filter:blur(28px);pointer-events:none}
.clb{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.cv{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;margin-bottom:3px}
.st{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.12em;margin:24px 0 10px}
.fn{background:var(--s);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:20px}
.fr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fr:last-child{margin-bottom:0}
.flb{font-size:12px;width:100px;flex-shrink:0;color:var(--mu)}
.fbw{flex:1;background:var(--s2);border-radius:4px;height:24px;overflow:hidden}
.fb{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#000;transition:width 1s cubic-bezier(.4,0,.2,1);min-width:36px}
.fp{font-size:11px;color:var(--mu);width:34px;text-align:right;flex-shrink:0}
.rc{background:var(--s);border:1px solid rgba(240,180,41,.18);border-radius:var(--r);padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.rc::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(240,180,41,.05),transparent 60%);pointer-events:none}
.rc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--go),transparent)}
.rlb{font-size:10px;color:var(--go);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.rv{font-family:'Bebas Neue',sans-serif;font-size:54px;color:var(--go);line-height:1;margin-bottom:6px}
.rs{font-size:11px;color:var(--mu)}
.cc{background:var(--s);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:20px}
.ct2{font-size:11px;font-weight:500;color:var(--mu);margin-bottom:16px;letter-spacing:.04em;text-transform:uppercase}
.ll2{display:flex;flex-direction:column;gap:8px}
.li{background:var(--s);border:1px solid var(--bo);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.li:hover{border-color:rgba(240,180,41,.12)}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--go),var(--go2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:#000;flex-shrink:0}
.ni{flex:1;min-width:0}
.nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt{font-size:11px;color:var(--mu);margin-top:1px}
.bd{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase}
.ba{background:rgba(77,166,255,.1);color:var(--bl)}
.bt{background:rgba(240,180,41,.1);color:var(--go)}
.be{background:rgba(255,77,77,.1);color:var(--re)}
.bm{background:rgba(34,201,122,.1);color:var(--gr)}
.mb{background:rgba(34,201,122,.07);border:1px solid rgba(34,201,122,.18);color:var(--gr);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .2s;font-family:'Inter',sans-serif}
.mb:hover{background:rgba(34,201,122,.15)}
.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.fc{background:var(--s);border:1px solid var(--bo);border-radius:var(--r);padding:18px 16px;text-align:center;transition:border-color .2s}
.fc:hover{border-color:rgba(240,180,41,.18)}
.fd{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.fn2{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:1;margin-bottom:4px}
.fl{font-size:11px;color:var(--mu)}
.al{background:rgba(255,77,77,.05);border:1px solid rgba(255,77,77,.12);border-radius:10px;padding:11px 14px;font-size:12px;color:#ff8080;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ld{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--mu);font-size:13px;gap:10px}
.sp{width:16px;height:16px;border:2px solid var(--bo);border-top-color:var(--go);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.em{text-align:center;padding:32px;color:var(--mu);font-size:13px}
.lu{text-align:center;font-size:10px;color:#2a2a2a;padding:16px;letter-spacing:.06em;text-transform:uppercase}
@media(max-width:480px){.ct{padding:14px}.hd{padding:12px 14px}.cv{font-size:34px}.rv{font-size:42px}}
</style>
</head>

    e.setAttribute('aria-label','Ocultar senha');
    e.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
  }else{
    i.type='password';
    e.classList.remove('on');
    e.setAttribute('aria-label','Mostrar senha');
    e.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
  }
  i.focus();
}

function login(){
  if(document.getElementById('pi').value===PW){
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    load();
  }else{
    document.getElementById('le').textContent='Senha incorreta.';
  }
}

async function apireq(t,q){
  q=q||'';
  var r=await fetch(SU+'/rest/v1/'+t+q,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function patchreq(t,id,d){
  var r=await fetch(SU+'/rest/v1/'+t+'?id=eq.'+id,{
    method:'PATCH',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},
    body:JSON.stringify(d)
  });
  return r.ok;
}

function tab(t,b){
  document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(x){x.classList.remove('active');});
  document.getElementById('t-'+t).classList.add('active');
  b.classList.add('active');
}

function da(d){
  var diff=(Date.now()-new Date(d).getTime())/86400000;
  if(diff<0.04) return 'agora';
  if(diff<1) return Math.floor(diff*24)+'h atrás';
  if(diff<2) return 'ontem';
  return Math.floor(diff)+'d atrás';
}

function ini(n){return n?n.charAt(0).toUpperCase():'?';}

function brl(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}

function card(lbl,val,cor,glow){
  return '<div class="cd"><div class="cgl" style="background:'+glow+'"></div><div class="clb">'+lbl+'</div><div class="cv" style="color:'+cor+'">'+val+'</div></div>';
}

function leadItem(nome,tel,info,badgeClass,badgeText){
  return '<div class="li"><div class="av">'+ini(nome)+'</div><div class="ni"><div class="nm">'+(nome||'Sem nome')+'</div><div class="mt">'+tel+' · '+info+'</div></div><span class="bd '+badgeClass+'">'+badgeText+'</span></div>';
}

function leadItemBtn(nome,tel,info,id){
  return '<div class="li"><div class="av">'+ini(nome)+'</div><div class="ni"><div class="nm">'+(nome||'Sem nome')+'</div><div class="mt">'+tel+' · '+info+'</div></div><button class="mb" onclick="matricular(\''+id+'\',this)">✓ Matricular</button></div>';
}

async function matricular(id,btn){
  btn.disabled=true;
  btn.textContent='...';
  if(await patchreq('leads',id,{status:'matriculado'})){
    load();
  }else{
    btn.disabled=false;
    btn.textContent='✓ Matricular';
  }
}

async function load(){
  var ic=document.getElementById('ri');
  ic.style.animation='spin .8s linear infinite';
  try{
    var leads=await apireq('leads','?select=*&order=created_at.desc');
    var fups=await apireq('followups','?select=*&order=enviado_em.desc');
    renderHoje(leads);
    renderFunil(leads);
    renderPipeline(leads);
    renderFollowup(leads,fups);
    document.getElementById('lu').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){console.error(e);}
  ic.style.animation='';
}

function renderHoje(leads){
  var h=new Date(); h.setHours(0,0,0,0);
  var novos=leads.filter(function(l){return new Date(l.created_at)>=h;});
  var tr=leads.filter(function(l){return l.status==='transferido'&&new Date(l.ultima_interacao_em)>=h;});
  var at=leads.filter(function(l){return l.status==='ativo';}).length;
  var pp=leads.filter(function(l){return l.status==='transferido';}).length;
  var sr=leads.filter(function(l){
    if(l.status!=='ativo') return false;
    var d=(Date.now()-new Date(l.ultima_interacao_em).getTime())/86400000;
    return d>1&&d<=3;
  });
  document.getElementById('al').innerHTML=sr.length>0?'<div class="al">⚠ '+sr.length+' lead'+(sr.length>1?'s':'')+' sem resposta há mais de 24h</div>':'';
  document.getElementById('ch').innerHTML=
    card('Novos hoje',novos.length,'#4da6ff','rgba(77,166,255,0.1)')+
    card('Para recepção',tr.length,'#f0b429','rgba(240,180,41,0.15)')+
    card('Em conversa',at,'#9b6dff','rgba(155,109,255,0.08)')+
    card('No pipeline',pp,'#22c97a','rgba(34,201,122,0.08)');
  var d=document.getElementById('lh');
  if(!novos.length){d.innerHTML='<div class="em">Nenhum lead novo hoje.</div>';return;}
  var html='';
  for(var i=0;i<Math.min(novos.length,10);i++){
    var l=novos[i];
    html+=leadItem(l.nome,l.telefone,da(l.created_at),'b'+l.status.charAt(0),l.status);
  }
  d.innerHTML=html;
}

function renderFunil(leads){
  var tot=leads.length;
  var at=leads.filter(function(l){return l.status==='ativo';}).length;
  var tr=leads.filter(function(l){return l.status==='transferido';}).length;
  var mt=leads.filter(function(l){return l.status==='matriculado';}).length;
  function pct(n){return tot?Math.round(n/tot*100):0;}
  document.getElementById('rv').textContent=brl(tr*TK);
  var etapas=[
    {l:'Total leads',v:tot,c:'#4da6ff',p:100},
    {l:'Em conversa',v:at,c:'#9b6dff',p:pct(at)},
    {l:'Transferidos',v:tr,c:'#f0b429',p:pct(tr)},
    {l:'Matriculados',v:mt,c:'#22c97a',p:pct(mt)}
  ];
  var html='';
  for(var i=0;i<etapas.length;i++){
    var e=etapas[i];
    html+='<div class="fr"><div class="flb">'+e.l+'</div><div class="fbw"><div class="fb" style="width:'+e.p+'%;background:'+e.c+'">'+e.v+'</div></div><div class="fp">'+e.p+'%</div></div>';
  }
  document.getElementById('fn').innerHTML=html;
  var dias=[],cnts=[];
  for(var j=13;j>=0;j--){
    var d=new Date(); d.setDate(d.getDate()-j); d.setHours(0,0,0,0);
    var nx=new Date(d); nx.setDate(nx.getDate()+1);
    dias.push(d.getDate()+'/'+(d.getMonth()+1));
    cnts.push(leads.filter(function(l){var c=new Date(l.created_at);return c>=d&&c<nx;}).length);
  }
  if(ch) ch.destroy();
  var ctx=document.getElementById('cl').getContext('2d');
  ch=new Chart(ctx,{
    type:'bar',
    data:{labels:dias,datasets:[{data:cnts,backgroundColor:'rgba(240,180,41,0.15)',borderColor:'rgba(240,180,41,0.6)',borderWidth:1.5,borderRadius:5}]},
    options:{plugins:{legend:{display:false},tooltip:{backgroundColor:'#181818',borderColor:'rgba(240,180,41,0.2)',borderWidth:1,titleColor:'#f0b429',bodyColor:'#888'}},scales:{x:{ticks:{color:'#3a3a3a',font:{size:10}},grid:{color:'rgba(255,255,255,0.025)'}},y:{ticks:{color:'#3a3a3a',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,0.025)'}}}}
  });
  // lista matriculados
  var mts=leads.filter(function(l){return l.status==='matriculado';});
  mts.sort(function(a,b){return new Date(b.updated_at)-new Date(a.updated_at);});
  var mhtml='<div class="st" style="margin-top:28px;margin-bottom:12px">✅ Matriculados</div>';
  if(!mts.length){
    mhtml+='<div class="em">Nenhum matriculado ainda.</div>';
  } else {
    for(var k=0;k<mts.length;k++){
      var m=mts[k];
      mhtml+='<div class="li" style="border-left:3px solid #22c97a"><div class="av" style="background:rgba(34,201,122,.15);color:#22c97a">'+ini(m.nome)+'</div><div class="ni"><div class="nm">'+(m.nome||'Sem nome')+'</div><div class="mt">'+m.telefone+' · matriculado '+da(m.updated_at)+'</div></div></div>';
    }
  }
  var sec=document.getElementById('mt-sec');
  if(!sec){sec=document.createElement('div');sec.id='mt-sec';document.getElementById('t-funil').appendChild(sec);}
  sec.innerHTML=mhtml;
}

function renderPipeline(leads){
  var tr=leads.filter(function(l){return l.status==='transferido';});
  tr.sort(function(a,b){return new Date(b.ultima_interacao_em)-new Date(a.ultima_interacao_em);});
  var d=document.getElementById('pl');
  if(!tr.length){d.innerHTML='<div class="em">Nenhum lead aguardando fechamento.</div>';return;}
  var html='';
  for(var i=0;i<tr.length;i++){
    var l=tr[i];
    html+=leadItemBtn(l.nome,l.telefone,'transferido '+da(l.ultima_interacao_em),l.id);
  }
  d.innerHTML=html;
}

function renderFollowup(leads,fups){
  var now=Date.now(),dia=86400000;
  var el=leads.filter(function(l){return l.status==='ativo'&&l.ultima_interacao_em;});
  function emDia(l,d){
    var diff=(now-new Date(l.ultima_interacao_em).getTime())/dia;
    var env=fups.some(function(f){return f.lead_id===l.id&&f.dia===d;});
    if(env) return false;
    if(d===1) return diff>=1&&diff<3;
    if(d===3) return diff>=3&&diff<7;
    if(d===7) return diff>=7&&diff<14;
    if(d===14) return diff>=14&&diff<30;
    return false;
  }
  var c1=el.filter(function(l){return emDia(l,1);}).length;
  var c3=el.filter(function(l){return emDia(l,3);}).length;
  var c7=el.filter(function(l){return emDia(l,7);}).length;
  var c14=el.filter(function(l){return emDia(l,14);}).length;
  var dias=[['Dia 1','#4da6ff',c1],['Dia 3','#9b6dff',c3],['Dia 7','#f0b429',c7],['Dia 14','#ff4d4d',c14]];
  var html='';
  for(var i=0;i<dias.length;i++){
    var x=dias[i];
    html+='<div class="fc"><div class="fd">'+x[0]+'</div><div class="fn2" style="color:'+x[1]+'">'+x[2]+'</div><div class="fl">pendentes</div></div>';
  }
  document.getElementById('fgr').innerHTML=html;
  var em=el.filter(function(l){return emDia(l,1)||emDia(l,3)||emDia(l,7)||emDia(l,14);});
  em.sort(function(a,b){return new Date(a.ultima_interacao_em)-new Date(b.ultima_interacao_em);});
  var d=document.getElementById('fls');
  if(!em.length){d.innerHTML='<div class="em">Nenhum lead na sequência agora.</div>';return;}
  var cores={1:'#4da6ff',3:'#9b6dff',7:'#f0b429',14:'#ff4d4d'};
  var fhtml='';
  for(var j=0;j<em.length;j++){
    var l=em[j];
    var diff=(now-new Date(l.ultima_interacao_em).getTime())/dia;
    var dn=1;
    if(diff>=14) dn=14;
    else if(diff>=7) dn=7;
    else if(diff>=3) dn=3;
    fhtml+='<div class="li"><div class="av">'+ini(l.nome)+'</div><div class="ni"><div class="nm">'+(l.nome||'Sem nome')+'</div><div class="mt">'+l.telefone+' · silêncio há '+Math.floor(diff)+'d</div></div><span class="bd" style="background:rgba(255,255,255,0.04);color:'+cores[dn]+'">dia '+dn+'</span></div>';
  }
  d.innerHTML=fhtml;
}
</script>
